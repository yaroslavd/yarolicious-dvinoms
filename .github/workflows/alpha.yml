name: Alpha – CI (Every Push)

on:
  push:
    branches:
      - "**"

concurrency:
  group: alpha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck · Unit Tests · Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Lint (Prettier)
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

  promote-to-beta:
    name: Promote to Beta
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Push to beta branch
        run: git push origin HEAD:refs/heads/beta --force
