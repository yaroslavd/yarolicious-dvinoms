# Production – Public release
#
# SETUP REQUIRED – GitHub Environment with Required Reviewers:
# 1. Go to your repo → Settings → Environments → New environment → name it "production"
# 2. Check "Required reviewers" and add one or more team members / leads
# 3. Restrict deployment branches to "main" only
# 4. Add the REPLIT_PROD_DEPLOY_HOOK secret to this environment
#    (or as a repository secret — the workflow references secrets.REPLIT_PROD_DEPLOY_HOOK)

name: Production – CI + Approval + Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Full Quality Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Lint (Prettier)
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PROD_APP_URL }}

  deploy:
    name: Deploy to Production (requires approval)
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Replit Production deployment
        run: |
          curl -sf -X POST "${{ secrets.REPLIT_PROD_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'
        env:
          REPLIT_PROD_DEPLOY_HOOK: ${{ secrets.REPLIT_PROD_DEPLOY_HOOK }}

      # ────────────────────────────────────────────────────────────────
      # PLACEHOLDER: App Store Submission
      # ────────────────────────────────────────────────────────────────
      # When you're ready to submit to the Apple App Store, add a step here.
      # You will need:
      #   1. An Apple Developer account and App Store Connect API key
      #   2. Secrets: APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID,
      #      APP_STORE_CONNECT_PRIVATE_KEY
      #   3. A step that builds the iOS app (e.g. using expo build or eas build)
      #      and uploads it via `xcrun altool` or `fastlane deliver`
      #
      # Example (using Fastlane):
