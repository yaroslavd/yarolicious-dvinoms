openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Recipe Import Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: recipes
    description: Recipe management
  - name: paprika
    description: Paprika integration
  - name: ai
    description: AI recipe generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all saved recipes
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a recipe manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"

  /recipes/{id}:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get a single recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /recipes/import-url:
    post:
      operationId: importRecipeFromUrl
      tags: [recipes]
      summary: Import a recipe from a URL (supports any cooking site)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportUrlBody"
      responses:
        "200":
          description: Imported recipe (not yet saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeInput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/generate:
    post:
      operationId: generateRecipe
      tags: [ai]
      summary: Generate a recipe using AI from a description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRecipeBody"
      responses:
        "200":
          description: AI-generated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeInput"

  /recipes/{id}/export-to-paprika:
    post:
      operationId: exportRecipeToPaprika
      tags: [paprika]
      summary: Export a saved recipe to Paprika
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Export result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaprikaExportResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /paprika/credentials:
    get:
      operationId: getPaprikaCredentials
      tags: [paprika]
      summary: Check if Paprika credentials are configured
      responses:
        "200":
          description: Credential status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaprikaCredentials"
    post:
      operationId: setPaprikaCredentials
      tags: [paprika]
      summary: Set Paprika account credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaprikaCredentialsInput"
      responses:
        "200":
          description: Credentials saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaprikaCredentials"

  /paprika/categories:
    get:
      operationId: getPaprikaCategories
      tags: [paprika]
      summary: Fetch categories live from the user's Paprika account
      responses:
        "200":
          description: List of Paprika categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaprikaCategoriesResponse"
        "400":
          description: No credentials configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /paprika/categorize-preview:
    post:
      operationId: categorizationPreview
      tags: [paprika]
      summary: Get AI-suggested category additions for all recipes
      responses:
        "200":
          description: Category suggestions for each recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorizationPreview"
        "400":
          description: No credentials or no recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /paprika/categorize-apply:
    post:
      operationId: categorizationApply
      tags: [paprika]
      summary: Apply category updates to recipes and re-sync to Paprika
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategorizationApplyBody"
      responses:
        "200":
          description: Apply result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorizationApplyResult"
        "400":
          description: No credentials configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RecipeInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        ingredients:
          type: string
        directions:
          type: string
        servings:
          type: ["string", "null"]
        totalTime:
          type: ["string", "null"]
        prepTime:
          type: ["string", "null"]
        cookTime:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        nutritionalInfo:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        categories:
          type: ["string", "null"]
        difficulty:
          type: ["string", "null"]
      required:
        - name
        - ingredients
        - directions

    Recipe:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        ingredients:
          type: string
        directions:
          type: string
        servings:
          type: ["string", "null"]
        totalTime:
          type: ["string", "null"]
        prepTime:
          type: ["string", "null"]
        cookTime:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        nutritionalInfo:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        categories:
          type: ["string", "null"]
        difficulty:
          type: ["string", "null"]
        exportedToPaprika:
          type: boolean
        paprikaUid:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ingredients
        - directions
        - exportedToPaprika
        - createdAt
        - updatedAt

    ImportUrlBody:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    GenerateRecipeBody:
      type: object
      properties:
        description:
          type: string
        preferences:
          type: ["string", "null"]
      required:
        - description

    PaprikaExportResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        paprikaUid:
          type: ["string", "null"]
      required:
        - success
        - message

    PaprikaCredentials:
      type: object
      properties:
        configured:
          type: boolean
        email:
          type: ["string", "null"]
      required:
        - configured

    PaprikaCredentialsInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    PaprikaCategory:
      type: object
      properties:
        uid:
          type: string
        name:
          type: string
      required:
        - uid
        - name

    PaprikaCategoriesResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/PaprikaCategory"
      required:
        - categories

    CategorizationSuggestion:
      type: object
      properties:
        recipeId:
          type: integer
        recipeName:
          type: string
        currentCategories:
          type: array
          items:
            type: string
        toAdd:
          type: array
          items:
            $ref: "#/components/schemas/PaprikaCategory"
      required:
        - recipeId
        - recipeName
        - currentCategories
        - toAdd

    CategorizationPreview:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/CategorizationSuggestion"
      required:
        - suggestions

    CategorizationApplication:
      type: object
      properties:
        recipeId:
          type: integer
        categoryUids:
          type: array
          items:
            type: string
        categoryNames:
          type: array
          items:
            type: string
      required:
        - recipeId
        - categoryUids
        - categoryNames

    CategorizationApplyBody:
      type: object
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/CategorizationApplication"
      required:
        - applications

    CategorizationApplyResult:
      type: object
      properties:
        applied:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - applied
        - errors
