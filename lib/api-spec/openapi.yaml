openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Recipe Import Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: recipes
    description: Recipe management
  - name: ai
    description: AI recipe generation
  - name: dietary
    description: Dietary profiles and compliance scoring
  - name: chatgpt
    description: ChatGPT integration for recipe imports
  - name: cart
    description: Shopping cart management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all saved recipes
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a recipe manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"

  /recipes/{id}:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get a single recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /recipes/{id}/restore:
    post:
      operationId: restoreRecipe
      tags: [recipes]
      summary: Restore a soft-deleted recipe from trash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Restored
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/import-url:
    post:
      operationId: importRecipeFromUrl
      tags: [recipes]
      summary: Import a recipe from a URL (supports any cooking site)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportUrlBody"
      responses:
        "200":
          description: Imported recipe (not yet saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeInput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/generate:
    post:
      operationId: generateRecipe
      tags: [ai]
      summary: Generate a recipe using AI from a description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRecipeBody"
      responses:
        "200":
          description: AI-generated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeInput"

  /dietary-profiles:
    get:
      operationId: listDietaryProfiles
      tags: [dietary]
      summary: List all dietary profiles
      responses:
        "200":
          description: List of dietary profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DietaryProfile"
    post:
      operationId: createDietaryProfile
      tags: [dietary]
      summary: Create a dietary profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietaryProfileInput"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietaryProfile"

  /dietary-profiles/{id}:
    patch:
      operationId: updateDietaryProfile
      tags: [dietary]
      summary: Update a dietary profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietaryProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietaryProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDietaryProfile
      tags: [dietary]
      summary: Delete a dietary profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dietary-profiles/{id}/restore:
    post:
      operationId: restoreDietaryProfile
      tags: [dietary]
      summary: Restore a soft-deleted dietary profile from trash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Restored
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/compliance-score:
    post:
      operationId: computeComplianceScore
      tags: [dietary]
      summary: Compute compliance score for a recipe against a profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceScoreRequest"
      responses:
        "200":
          description: Compliance score result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceScoreResult"

  /recipes/{id}/compliance-scores:
    get:
      operationId: getRecipeComplianceScores
      tags: [dietary]
      summary: Get stored compliance scores for a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: query
          required: false
          description: If provided, return scores for this specific recipe version; otherwise returns base recipe scores
          schema:
            type: integer
      responses:
        "200":
          description: Compliance scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoredComplianceScore"

  /recipes/compliance-scores/bulk:
    get:
      operationId: getBulkComplianceScores
      tags: [dietary]
      summary: Get compliance scores for all recipes (for recipe cards)
      responses:
        "200":
          description: Map of recipeId to array of compliance scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoredComplianceScore"

  /recipes/dietary-suggestions:
    post:
      operationId: getDietarySuggestions
      tags: [dietary]
      summary: Get dietary suggestions for a recipe against selected profiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietarySuggestionsRequest"
      responses:
        "200":
          description: List of dietary suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietarySuggestionsResponse"

  /recipes/{id}/compliance-fix-preview:
    post:
      operationId: complianceFixPreview
      tags: [dietary]
      summary: Preview AI-suggested swaps and projected compliance scores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceFixPreviewRequest"
      responses:
        "200":
          description: Suggested swaps and projected scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceFixPreviewResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{id}/compliance-versions:
    post:
      operationId: saveComplianceVersion
      tags: [dietary]
      summary: Save a new compliance-adapted version of a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveComplianceVersionRequest"
      responses:
        "201":
          description: Created version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeVersion"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{id}/versions:
    get:
      operationId: listRecipeVersions
      tags: [dietary]
      summary: List all versions of a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeVersionSummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{id}/versions/{versionId}:
    get:
      operationId: getRecipeVersion
      tags: [dietary]
      summary: Get a specific version of a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeVersion"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRecipeVersion
      tags: [dietary]
      summary: Delete a specific version of a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Cannot delete original version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{id}/versions/{versionId}/restore:
    post:
      operationId: restoreRecipeVersion
      tags: [dietary]
      summary: Restore a soft-deleted recipe version from trash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Restored
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trash:
    get:
      operationId: getTrash
      tags: [trash]
      summary: Get all soft-deleted items
      responses:
        "200":
          description: All trashed items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrashItems"

  /trash/recipes/{id}:
    delete:
      operationId: hardDeleteRecipe
      tags: [trash]
      summary: Permanently delete a recipe from trash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Permanently deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trash/profiles/{id}:
    delete:
      operationId: hardDeleteProfile
      tags: [trash]
      summary: Permanently delete a dietary profile from trash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Permanently deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trash/versions/{id}:
    delete:
      operationId: hardDeleteVersion
      tags: [trash]
      summary: Permanently delete a recipe version from trash
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Permanently deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chatgpt/import:
    post:
      operationId: chatgptImportRecipe
      tags: [chatgpt]
      summary: Import a recipe from ChatGPT (requires API key)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatgptImportBody"
      responses:
        "201":
          description: Recipe queued for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatgptImportResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chatgpt/pending:
    get:
      operationId: listPendingRecipes
      tags: [chatgpt]
      summary: List pending recipes from ChatGPT imports
      responses:
        "200":
          description: List of pending recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatgptPendingRecipe"

  /chatgpt/pending/{id}/confirm:
    post:
      operationId: confirmPendingRecipe
      tags: [chatgpt]
      summary: Confirm and save a pending recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Recipe confirmed and saved
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chatgpt/pending/{id}:
    delete:
      operationId: dismissPendingRecipe
      tags: [chatgpt]
      summary: Dismiss and delete a pending recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Recipe dismissed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chatgpt/api-key:
    get:
      operationId: getChatgptApiKey
      tags: [chatgpt]
      summary: Get the current API key status
      responses:
        "200":
          description: API key status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatgptApiKeyStatus"

  /chatgpt/api-key/regenerate:
    post:
      operationId: regenerateChatgptApiKey
      tags: [chatgpt]
      summary: Regenerate the ChatGPT integration API key
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatgptApiKeyRegenResult"

  /cart:
    get:
      operationId: listCartItems
      tags: [cart]
      summary: List all shopping cart items
      responses:
        "200":
          description: List of cart items ordered by aisle and name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear cart items (all or checked only)
      parameters:
        - in: query
          name: mode
          schema:
            type: string
            enum: [all, checked]
            default: all
          required: false
          description: "all = clear everything; checked = clear only checked items"
      responses:
        "204":
          description: Items cleared

  /cart/items:
    post:
      operationId: addCartItems
      tags: [cart]
      summary: Add one or more free-form ingredient strings to the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemsBody"
      responses:
        "201":
          description: Items added or quantities aggregated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cart/items/{id}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update quantity and/or unit of a cart item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemBody"
      responses:
        "200":
          description: Updated cart item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCartItem
      tags: [cart]
      summary: Delete a single cart item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Item deleted
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cart/items/{id}/toggle:
    patch:
      operationId: toggleCartItem
      tags: [cart]
      summary: Toggle the checked status of a cart item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RecipeInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        ingredients:
          type: string
        directions:
          type: string
        servings:
          type: ["string", "null"]
        totalTime:
          type: ["string", "null"]
        prepTime:
          type: ["string", "null"]
        cookTime:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        nutritionalInfo:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        categories:
          type: ["string", "null"]
        difficulty:
          type: ["string", "null"]
        originType:
          type: ["string", "null"]
          enum: ["imported", "ai_generated", "manual", null]
          description: "How the recipe was created: 'imported', 'ai_generated', or 'manual'"
        generationPrompt:
          type: ["string", "null"]
          description: The prompt used to generate this recipe (only for ai_generated recipes)
      required:
        - name
        - ingredients
        - directions

    Recipe:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        ingredients:
          type: string
        directions:
          type: string
        servings:
          type: ["string", "null"]
        totalTime:
          type: ["string", "null"]
        prepTime:
          type: ["string", "null"]
        cookTime:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        nutritionalInfo:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        categories:
          type: ["string", "null"]
        difficulty:
          type: ["string", "null"]
        rating:
          type: integer
          description: Star rating (0-5)
        originType:
          type: ["string", "null"]
          enum: ["imported", "ai_generated", "manual", null]
          description: "How the recipe was created: 'imported', 'ai_generated', or 'manual'"
        generationPrompt:
          type: ["string", "null"]
          description: The prompt used to generate this recipe (only for ai_generated recipes)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ingredients
        - directions
        - rating
        - createdAt
        - updatedAt

    ImportUrlBody:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    GenerateRecipeBody:
      type: object
      properties:
        description:
          type: string
        preferences:
          type: ["string", "null"]
      required:
        - description

    DietaryProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - createdAt
        - updatedAt

    DietaryProfileInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
        - description

    ComplianceScoreRequest:
      type: object
      properties:
        recipeId:
          type: integer
        profileId:
          type: integer
        ingredients:
          type: string
        directions:
          type: string
        profileDescription:
          type: string
      required:
        - recipeId
        - profileId
        - ingredients
        - directions
        - profileDescription

    ComplianceScoreResult:
      type: object
      properties:
        score:
          type: integer
        reason:
          type: string
      required:
        - score
        - reason

    StoredComplianceScore:
      type: object
      properties:
        id:
          type: integer
        recipeId:
          type: integer
        profileId:
          type: integer
        profileName:
          type: string
        score:
          type: integer
        reason:
          type: string
        prosList:
          type: array
          items:
            type: string
          nullable: true
        consList:
          type: array
          items:
            type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - recipeId
        - profileId
        - profileName
        - score
        - reason
        - updatedAt

